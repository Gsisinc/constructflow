<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://base44.com/logo_v2.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="description" content="MYGSIS — Golden State Integrated Systems. Low voltage solutions, construction management, and the MYGSIS app at mygsis.com" />
    <link rel="canonical" href="https://mygsis.com/" />
    <title>MYGSIS — Golden State Integrated Systems | mygsis.com</title>
  </head>
  <body>
    <div id="root">
      <div id="loading-fallback" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#102a43;color:#fbbf24;font-family:system-ui,sans-serif;font-size:1.25rem;padding:1rem;text-align:center;">
        <span>Loading MYGSIS…</span>
        <p id="loading-message" style="margin-top:1rem;font-size:0.875rem;color:#94a3b8;display:none;">Taking a while? <a href="javascript:location.reload()" style="color:#fbbf24;">Refresh</a> or check the console (F12).</p>
      </div>
    </div>
    <script>
      (function(){
        setTimeout(function(){
          var root = document.getElementById('root');
          var msg = document.getElementById('loading-message');
          if (msg && root && root.querySelector('#loading-fallback')) msg.style.display = 'block';
        }, 6000);
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
